[tools]
cmake = "4.2.3"
clang = "21.1.8"

[tasks.setup]
description = "Install system dependencies"
run = "sudo apt install -y clang-tidy cppcheck"

[tasks.lint]
description = "Run clang-tidy on all source files"
run = "scripts/run-clang-tidy"

[tasks.prepare-lint]
description = "Prepare lint"
run = "cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"

[tasks.lint-fix]
description = "Run clang-tidy with auto-fix"
depends = ["prepare-lint"]
run = "scripts/run-clang-tidy-fix"

[tasks.cppcheck]
description = "Run cppcheck on all source files"
depends = ["prepare-lint"]
run = "scripts/run-cppcheck"

[tasks.check]
description = "Run all linters (clang-tidy + cppcheck)"
depends = ["lint", "cppcheck"]
